project:
  name: Griffin
  cpu: MC68000
  clock_hz: 14000000
  interrupt_mode: autovector

peripherals:
  GLUE:
    part: ATF1508AS
    description: "System glue logic"
    address_range:
      base: 0xF00000
      size: 0x040000
      width: 8
    interrupt:
      level: 5
      signal: ~ENGINE_IRQ  # not currently wired; pin 5 reused for BUS_FREE
    registers:
      - offset: 0x01
        name: DEBUG_OUT
        access: write
        width: 8
        description: "Set or clear DEBUG_OUT signal (debug LED and test point output)"
        bits:
          - { bit: "0", name: OUT, description: "DEBUG_OUT drive level" }
      - offset: 0x01
        name: DEBUG_IN
        access: read
        width: 8
        description: "Read DEBUG_IN signal state"
        bits:
          - { bit: "0", name: IN, description: "DEBUG_IN pin state" }
      - offset: 0x03
        name: SYSTICK_STATUS
        access: read
        width: 8
        description: "Systick timer status (fixed ~183 Hz = SYSCLK/65536); reading clears the pending flag and deasserts the IRQ"
        bits:
          - { bit: "0", name: PENDING, description: "Tick interrupt pending (read clears)" }
      - offset: 0x07
        name: CONFIG
        access: write
        width: 8
        description: "GLUE configuration register"
        bits:
          - { bit: "0", name: ROM_OVERLAY_DISABLE, default: 0,
              description: "Write 1 to disable ROM overlay and unmap ROM from RAM bank 1 address space" }
          - { bit: "1", name: SYSTICK_IRQ_ENABLE, default: 0,
              description: "Write 1 to enable systick interrupt on nIPL; default 0 masks the IRQ (timer still runs, pending flag still sets)" }
      - offset: 0x09
        name: TIMER
        access: write
        width: 8
        description: |
          8-bit auto-reload timer period (bits 7:0), ticks every SYSCLK.
          Counter counts N+1 states (N down to 0 inclusive), so
          effective period = (N+1) SYSCLK cycles (N = 1..255, range
          2..256 clocks, ~143 ns..18.3 µs at 14 MHz).  Writing a non-zero
          value loads the period register and starts a free-running
          countdown that auto-reloads on reaching 0.  Writing 0 stops
          the timer.  Use with TIMER_ARM to create deterministic
          periodic I/O timing without cycle counting.  For periods > 256,
          chain multiple TIMER_ARM writes.
        bits:
          - { bit: "7:0", name: PERIOD, description: "Countdown period in SYSCLK cycles (1-255)" }
      - offset: 0x0B
        name: TIMER_ARM
        access: write
        width: 8
        description: |
          Arm the timer gate.  Any write sets the armed flag; data
          value is ignored.  While armed, ALL bus DTACK is blocked
          (CPU frozen) until the timer countdown reaches 0.  Armed
          flag auto-clears on the next timer zero-crossing.
          Typical use: arm, then issue the periodic I/O write — the
          stall absorbs variable instruction timing so the period
          between successive I/O operations is exactly TIMER clocks.

  ROM:
    part: "2x 64K byte-wide EPROM/Flash"
    address_range:
      base: 0xC00000
      size: 0x020000    # 128K chip data (2x 64K byte-wide)
      window: 0x100000  # 1MB decode window; 128K repeats throughout
      width: 16
    dtack:
      - 12000000: 1
      - 14000000: 1
      - 14318181: 1
      - 16000000: 1
      - 20000000: 1
    linker:
      section: rom

  RAM_BANK_1:
    part: "SRAM"
    address_range:
      base: 0x000000
      size: 0x100000
      width: 16
    dtack:
      - 12000000: 0
      - 14000000: 0
      - 14318181: 0
      - 16000000: 0
      - 20000000: 1
    linker:
      section: ram

  RAM_BANK_2:
    part: "SRAM"
    address_range:
      base: 0x100000
      size: 0x100000
      width: 16
    dtack:
      - 12000000: 0
      - 14000000: 0
      - 14318181: 0
      - 16000000: 0
      - 20000000: 1

  RAM_BANK_3:
    part: "SRAM"
    address_range:
      base: 0x200000
      size: 0x100000
      width: 16
    dtack:
      - 12000000: 0
      - 14000000: 0
      - 14318181: 0
      - 16000000: 0
      - 20000000: 1

  RAM_BANK_4:
    part: "SRAM"
    address_range:
      base: 0x300000
      size: 0x100000
      width: 16
    dtack:
      - 12000000: 0
      - 14000000: 0
      - 14318181: 0
      - 16000000: 0
      - 20000000: 1

  VIDEO:
    part: ATF1508AS
    description: >
      On-board video generator.  Hardcoded VGA 640x480@60 1bpp; the framebuffer
      is fed by ENGINE DMA over the bodge wires (NEED_WORD/SOF/EOL/LATCH).
      Each pixel bit indexes a 2-entry R3G3B2 palette loaded by the CPU.
    clock: [25175000]
    dtack:
      - 12000000: 0
      - 14000000: 0
      - 14318181: 0
      - 16000000: 0
      - 20000000: 0
    address_range:
      base: 0xE00000
      size: 0x100000
      width: [8, 16]
    interrupt:
      level: 6
      signal: ~VIDEO_IRQ
    registers:
      - offset: 0x07
        name: STATUS
        access: read
        width: 8
        description: "Read-only scan-position hint for CPU polling"
        bits:
          - { bit: "0", name: LINE_TOGGLE,
              description: "Toggles every visible line (v_cnt[0]); use for audio busywait pacing or palette-per-line tricks" }
      - offset: 0x0E
        name: PALETTE
        access: write
        width: 16
        description: >
          Two-entry R3G3B2 palette loaded immediately; can be written at any time.
          A write that lands inside active video may produce a single-pixel
          color glitch (~40 ns) at the affected scan position.
          Reset defaults: ENTRY_0=0x00 (black), ENTRY_1=0xFF (white).
        bits:
          - { bit: "7:0",  name: ENTRY_0, description: "R3G3B2 color used when pixel bit = 0" }
          - { bit: "15:8", name: ENTRY_1, description: "R3G3B2 color used when pixel bit = 1" }

  ENGINE:
    part: ATF1508AS
    description: "HALT-based bus-stealing DMA controller for video and audio"
    address_range:
      base: 0xD00000
      size: 0x100000
      width: 16
    dtack:
      - 12000000: 0
      - 14000000: 0
      - 14318181: 0
      - 16000000: 0
      - 20000000: 0
    glue_signals:
      # These use existing PCB traces (repurposed from ENGINE_DTACK / ENGINE_IRQ)
      - { pin: 4,  dir: out, to: GLUE,    name: HALT_REQ,  description: "Request CPU halt for DMA (PCB trace: was ~ENGINE_DTACK)" }
      - { pin: 5,  dir: in,  from: GLUE,  name: BUS_FREE,  description: "CPU halted, bus available (PCB trace: was ~ENGINE_IRQ)" }
    bodge_signals:
      - { pin: 2,  dir: in,  from: VIDEO, name: NEED_WORD, description: "VIDEO shift register needs data" }
      - { pin: 8,  dir: in,  from: VIDEO, name: SOF,       description: "Start of frame, resets fb pointer" }
      - { pin: 10, dir: in,  from: VIDEO, name: EOL,       description: "End of line, advance to next row" }
      - { pin: 40, dir: out, to: VIDEO,   name: LATCH,     description: "D[15:0] stable, capture now" }
    registers:
      - offset: 0x00
        name: CONTROL
        access: write
        width: 16
        description: "DMA enable control"
        bits:
          - { bit: "0", name: ENABLE, description: "1 = DMA enabled, 0 = idle" }
      - offset: 0x02
        name: FB_BASE
        access: write
        width: 16
        description: "Framebuffer base address A[21:14], 16KB-aligned, RAM only (A[23:22]=00)"
        bits:
          - { bit: "7:0", name: BASE, description: "A[21:14] of framebuffer base address" }
      - offset: 0x04
        name: ROW_STRIDE
        access: write
        width: 16
        description: >
          Row stride in multiples of 64 words (128 bytes).
          Progressive 640x1bpp: 1 (64 words). Interlaced 640x1bpp: 2 (128 words).
          Setting 0 repeats the same line (no row advance on EOL).
        bits:
          - bit: "1:0"
            name: STRIDE
            description: "stride / 64"
            values:
              - { value: 0, name: STRIDE_0,    description: "0 words (same line repeats)" }
              - { value: 1, name: STRIDE_64,   description: "64 words (128 bytes)" }
              - { value: 2, name: STRIDE_128,  description: "128 words (256 bytes)" }
              - { value: 3, name: STRIDE_192,  description: "192 words (384 bytes)" }
      - offset: 0x06
        name: STATUS
        access: rw
        width: 16
        description: "Read: error flags. Write: any write clears all sticky error bits."
        bits:
          - { bit: "0", name: OVERRUN, description: "Sticky: NEED_WORD asserted while DMA still busy (read-only)" }
      - offset: 0x08
        name: ADVANCE
        access: write
        width: 16
        description: >
          Write-only command: advance fb_ptr to next row start (same operation as EOL).
          Use in VSYNC ISR to offset field 1 by one framebuffer line before enabling DMA.

  CF:
    part: "Compact Flash (True IDE)"
    description: "Storage via CF card in True IDE 8-bit PIO mode"
    address_range:
      base: 0xF40000
      size: 0x040000
      width: 8
    dtack:
      - 12000000: 7
      - 14000000: 7
      - 14318181: 7
      - 16000000: 8
      - 20000000: 12
    registers:
      - { offset: 0x01, name: DATA,         access: rw,    width: 8,
          description: "Data to/from CF card" }
      - { offset: 0x03, name: ERROR,        access: read,  width: 8,
          description: "Error register; valid after a command error" }
      - { offset: 0x03, name: FEATURES,     access: write, width: 8,
          description: "Features register; written before issuing SET_FEATURES command" }
      - { offset: 0x05, name: SECTOR_COUNT, access: rw,    width: 8,
          description: "Number of sectors to transfer" }
      - { offset: 0x07, name: SECTOR_NUM,   access: rw,    width: 8,
          description: "LBA bits 7:0" }
      - { offset: 0x09, name: CYL_LO,       access: rw,    width: 8,
          description: "LBA bits 15:8" }
      - { offset: 0x0B, name: CYL_HI,       access: rw,    width: 8,
          description: "LBA bits 23:16" }
      - { offset: 0x0D, name: DRIVE_HEAD,   access: rw,    width: 8,
          description: "LBA bits 27:24 and drive select; OR with CF_DH_LBA for LBA mode" }
      - { offset: 0x0F, name: STATUS,       access: read,  width: 8,
          description: "Device status; poll BSY clear and DRQ set before data transfer" }
      - { offset: 0x0F, name: COMMAND,      access: write, width: 8,
          description: "Issue command; write after setting all other registers" }


  AUDIO:
    part: "74HC373 + R2R DAC"
    description: "8-bit latched audio output"
    address_range:
      base: 0xFC0000
      size: 0x040000
      width: 8
    dtack:
      - 12000000: 1
      - 14000000: 1
      - 14318181: 1
      - 16000000: 1
      - 20000000: 1
    registers:
      - { offset: 0x01, name: DAC, access: write, width: 8,
          description: "Write sample to 8-bit R2R DAC output latch" }

constants:
  CF_STATUS_BSY:   0x80
  CF_STATUS_DRDY:  0x40
  CF_STATUS_DRQ:   0x08
  CF_STATUS_ERR:   0x01
  CF_CMD_READ_SECTORS:  0x20
  CF_CMD_WRITE_SECTORS: 0x30
  CF_CMD_IDENTIFY:      0xEC
  CF_CMD_SET_FEATURES:  0xEF
  CF_CMD_SET_8BIT:      0x01
  CF_DH_LBA:            0xE0

bodges:
  - "Reroute A6 pad on U12 to A18"
  - "Route freed GLUE pin 75 to CPU ~VPA"
  - "Pull up CPU HALT with 4.7K to nearby CPU +5V"
  - "Swap MOUSE_CLK and KBD_DATA at MCU so MOUSE_CLK ends up on P3.2"
  - "Swap UART TX and RX on MCU"
  - "VIDEO pin 9 --> ENGINE pin 2: NEED_WORD"
  - "VIDEO pin 28 --> ENGINE pin 8: SOF"
  - "VIDEO pin 30 --> ENGINE pin 10: EOL"
  - "ENGINE pin 40 --> VIDEO pin 31: LATCH"
