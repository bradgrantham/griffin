project:
  name: Griffin
  cpu: MC68000
  clock_hz: 14000000
  interrupt_mode: autovector

peripherals:
  GLUE:
    part: ATF1508AS
    description: "System glue logic"
    address_range:
      base: 0xF00000
      size: 0x040000
      width: 8
    dtack:
      - 12000000: 0
      - 14000000: 0
      - 14318181: 0
      - 16000000: 0
      - 20000000: 0
    interrupt:
      level: 6
    registers:
      - offset: 0x01
        name: DEBUG_OUT
        access: write
        width: 8
        description: "Set or clear DEBUG_OUT signal (debug LED and test point output)"
        bits:
          - { bit: "0", name: OUT, description: "DEBUG_OUT drive level" }
      - offset: 0x01
        name: DEBUG_IN
        access: read
        width: 8
        description: "Read DEBUG_IN signal state"
        bits:
          - { bit: "0", name: IN, description: "DEBUG_IN pin state" }
      - offset: 0x07
        name: CONFIG
        access: write
        width: 8
        description: "GLUE configuration register"
        bits:
          - { bit: "0", name: ROM_OVERLAY_DISABLE, default: 0,
              description: "Write 1 to disable ROM overlay and unmap ROM from RAM bank 1 address space" }
      - offset: 0x09
        name: TIMER
        access: write
        width: 8
        description: |
          8-bit auto-reload timer period (bits 7:0), ticks every SYSCLK.
          Counter counts N+1 states (N down to 0 inclusive), so
          effective period = (N+1) SYSCLK cycles (N = 1..255, range
          2..256 clocks, ~143 ns..18.3 µs at 14 MHz).  Writing a non-zero
          value loads the period register and starts a free-running
          countdown that auto-reloads on reaching 0.  Writing 0 stops
          the timer.  Use with TIMER_ARM to create deterministic
          periodic I/O timing without cycle counting.  For periods > 256,
          chain multiple TIMER_ARM writes.
        bits:
          - { bit: "7:0", name: PERIOD, description: "Countdown period in SYSCLK cycles (1-255)" }
      - offset: 0x0B
        name: TIMER_ARM
        access: write
        width: 8
        description: |
          Arm the timer gate.  Any write sets the armed flag; data
          value is ignored.  While armed, ALL bus DTACK is blocked
          (CPU frozen) until the timer countdown reaches 0.  Armed
          flag auto-clears on the next timer zero-crossing.
          Typical use: arm, then issue the periodic I/O write — the
          stall absorbs variable instruction timing so the period
          between successive I/O operations is exactly TIMER clocks.

  ROM:
    part: "2x 64K byte-wide EPROM/Flash"
    address_range:
      base: 0xC00000
      size: 0x020000    # 128K chip data (2x 64K byte-wide)
      window: 0x100000  # 1MB decode window; 128K repeats throughout
      width: 16
    dtack:
      - 12000000: 1
      - 14000000: 1
      - 14318181: 1
      - 16000000: 1
      - 20000000: 1
    linker:
      section: rom

  RAM_BANK_1:
    part: "SRAM"
    address_range:
      base: 0x000000
      size: 0x100000
      width: 16
    dtack:
      - 12000000: 0
      - 14000000: 0
      - 14318181: 0
      - 16000000: 0
      - 20000000: 1
    linker:
      section: ram

  RAM_BANK_2:
    part: "SRAM"
    address_range:
      base: 0x100000
      size: 0x100000
      width: 16
    dtack:
      - 12000000: 0
      - 14000000: 0
      - 14318181: 0
      - 16000000: 0
      - 20000000: 1

  RAM_BANK_3:
    part: "SRAM"
    address_range:
      base: 0x200000
      size: 0x100000
      width: 16
    dtack:
      - 12000000: 0
      - 14000000: 0
      - 14318181: 0
      - 16000000: 0
      - 20000000: 1

  RAM_BANK_4:
    part: "SRAM"
    address_range:
      base: 0x300000
      size: 0x100000
      width: 16
    dtack:
      - 12000000: 0
      - 14000000: 0
      - 14318181: 0
      - 16000000: 0
      - 20000000: 1

  VIDEO:
    part: ATF1508AS
    description: "Just a pass-through for composite SYNC and PIXEL at the moment"
    dtack:
      - 12000000: 0
      - 14000000: 0
      - 14318181: 0
      - 16000000: 0
      - 20000000: 0
    address_range:
      base: 0xE00000
      size: 0x100000
      width: [8, 16]

  CF:
    part: "Compact Flash (True IDE)"
    description: "Storage via CF card in True IDE 8-bit PIO mode"
    address_range:
      base: 0xF40000
      size: 0x040000
      width: 8
    dtack:
      - 12000000: 7
      - 14000000: 7
      - 14318181: 7
      - 16000000: 8
      - 20000000: 12
    registers:
      - { offset: 0x01, name: DATA,         access: rw,    width: 8,
          description: "Data to/from CF card" }
      - { offset: 0x03, name: ERROR,        access: read,  width: 8,
          description: "Error register; valid after a command error" }
      - { offset: 0x03, name: FEATURES,     access: write, width: 8,
          description: "Features register; written before issuing SET_FEATURES command" }
      - { offset: 0x05, name: SECTOR_COUNT, access: rw,    width: 8,
          description: "Number of sectors to transfer" }
      - { offset: 0x07, name: SECTOR_NUM,   access: rw,    width: 8,
          description: "LBA bits 7:0" }
      - { offset: 0x09, name: CYL_LO,       access: rw,    width: 8,
          description: "LBA bits 15:8" }
      - { offset: 0x0B, name: CYL_HI,       access: rw,    width: 8,
          description: "LBA bits 23:16" }
      - { offset: 0x0D, name: DRIVE_HEAD,   access: rw,    width: 8,
          description: "LBA bits 27:24 and drive select; OR with CF_DH_LBA for LBA mode" }
      - { offset: 0x0F, name: STATUS,       access: read,  width: 8,
          description: "Device status; poll BSY clear and DRQ set before data transfer" }
      - { offset: 0x0F, name: COMMAND,      access: write, width: 8,
          description: "Issue command; write after setting all other registers" }

  DUART:
    part: 68681
    description: "serial IO, maybe some in and out pins"
    clock: 3686400
    address_range:
      base: 0xF80000
      size: 0x040000
      width: 8
    interrupt:
      level: 5
      signal: ~DUART_IRQ
    dtack: ~DUART_DTACK  # handshake: 68681 drives this signal to assert DTACK
    berr_timeout: 256
    registers:
      - { offset: 0x01, name: MR1A,   access: rw,    width: 8,
          description: "Channel A mode register 1 (after reset or MR pointer reset)" }
      - { offset: 0x01, name: MR2A,   access: rw,    width: 8,
          description: "Channel A mode register 2 (second access after MR pointer reset)" }
      - offset: 0x03
        name: SRA
        access: read
        width: 8
        description: "Channel A status register"
        bits:
          - { bit: "0", name: RXRDY, description: "Receiver ready" }
          - { bit: "1", name: FFULL, description: "FIFO full" }
          - { bit: "2", name: TXRDY, description: "Transmitter ready" }
          - { bit: "3", name: TXEMT, description: "Transmitter empty" }
          - { bit: "4", name: OE,    description: "Overrun error" }
          - { bit: "5", name: PE,    description: "Parity error" }
          - { bit: "6", name: FE,    description: "Framing error" }
          - { bit: "7", name: RB,    description: "Received break" }
      - { offset: 0x03, name: CSRA,   access: write, width: 8,
          description: "Channel A clock select register" }
      - offset: 0x05
        name: CRA
        access: write
        width: 8
        description: "Channel A command register"
        bits:
          - { bit: "1:0", name: EC,  description: "Enable command: 0=no action, 1=enable RX, 2=disable RX" }
          - { bit: "3:2", name: TC,  description: "Transmitter command: 0=no action, 1=enable TX, 2=disable TX" }
          - { bit: "6:4", name: MC,  description: "Misc command: 1=reset MR ptr, 2=reset RX, 3=reset TX, 4=reset error, 5=reset break, 6=start break, 7=stop break" }
      - { offset: 0x07, name: RBA,    access: read,  width: 8,
          description: "Channel A receiver buffer (read to dequeue FIFO)" }
      - { offset: 0x07, name: TBA,    access: write, width: 8,
          description: "Channel A transmitter buffer (write to enqueue)" }
      - { offset: 0x09, name: IPCR,   access: read,  width: 8,
          description: "Input port change register (read clears interrupt)" }
      - { offset: 0x09, name: ACR,    access: write, width: 8,
          description: "Auxiliary control register (timer/counter mode, BRG set select)" }
      - offset: 0x0B
        name: ISR
        access: read
        width: 8
        description: "Interrupt status register"
        bits:
          - { bit: "0", name: TXRDYA,      description: "Channel A TX ready" }
          - { bit: "1", name: RXRDYA,      description: "Channel A RX ready/FIFO full" }
          - { bit: "2", name: DELTA_BRKA,  description: "Channel A break change" }
          - { bit: "3", name: CTR_READY,   description: "Counter/timer ready" }
          - { bit: "4", name: TXRDYB,      description: "Channel B TX ready" }
          - { bit: "5", name: RXRDYB,      description: "Channel B RX ready/FIFO full" }
          - { bit: "6", name: DELTA_BRKB,  description: "Channel B break change" }
          - { bit: "7", name: IPC,         description: "Input port change" }
      - { offset: 0x0B, name: IMR,    access: write, width: 8,
          description: "Interrupt mask register (same bit layout as ISR; 1=enabled)" }
      - { offset: 0x0D, name: CUR,    access: read,  width: 8,
          description: "Counter/timer upper byte (current value)" }
      - { offset: 0x0D, name: CTUR,   access: write, width: 8,
          description: "Counter/timer upper preload register" }
      - { offset: 0x0F, name: CLR,    access: read,  width: 8,
          description: "Counter/timer lower byte (current value)" }
      - { offset: 0x0F, name: CTLR,   access: write, width: 8,
          description: "Counter/timer lower preload register" }
      - { offset: 0x11, name: MR1B,   access: rw,    width: 8,
          description: "Channel B mode register 1 (after reset or MR pointer reset)" }
      - { offset: 0x11, name: MR2B,   access: rw,    width: 8,
          description: "Channel B mode register 2 (second access after MR pointer reset)" }
      - { offset: 0x13, name: SRB,    access: read,  width: 8,
          description: "Channel B status register (same bit layout as SRA)" }
      - { offset: 0x13, name: CSRB,   access: write, width: 8,
          description: "Channel B clock select register" }
      - { offset: 0x15, name: CRB,    access: write, width: 8,
          description: "Channel B command register (same bit layout as CRA)" }
      - { offset: 0x17, name: RBB,    access: read,  width: 8,
          description: "Channel B receiver buffer (read to dequeue FIFO)" }
      - { offset: 0x17, name: TBB,    access: write, width: 8,
          description: "Channel B transmitter buffer (write to enqueue)" }
      - { offset: 0x19, name: IVR,    access: rw,    width: 8,
          description: "Interrupt vector register" }
      - { offset: 0x1B, name: IP,     access: read,  width: 8,
          description: "Input port (unlatched)" }
      - { offset: 0x1B, name: OPCR,   access: write, width: 8,
          description: "Output port configuration register" }
      - { offset: 0x1D, name: STARTCC, access: read, width: 8,
          description: "Start counter/timer command (read to start; data ignored)" }
      - { offset: 0x1D, name: OPR_SET, access: write, width: 8,
          description: "Output port bit set (1 bits set corresponding OP pins)" }
      - { offset: 0x1F, name: STOPCC,  access: read, width: 8,
          description: "Stop counter/timer command (read to stop; data ignored)" }
      - { offset: 0x1F, name: OPR_CLR, access: write, width: 8,
          description: "Output port bit reset (1 bits clear corresponding OP pins)" }

  AUDIO:
    part: "74HC373 + R2R DAC"
    description: "8-bit latched audio output"
    address_range:
      base: 0xFC0000
      size: 0x040000
      width: 8
    dtack:
      - 12000000: 1
      - 14000000: 1
      - 14318181: 1
      - 16000000: 1
      - 20000000: 1
    registers:
      - { offset: 0x01, name: DAC, access: write, width: 8,
          description: "Write sample to 8-bit R2R DAC output latch" }

constants:
  CF_STATUS_BSY:   0x80
  CF_STATUS_DRDY:  0x40
  CF_STATUS_DRQ:   0x08
  CF_STATUS_ERR:   0x01
  CF_CMD_READ_SECTORS:  0x20
  CF_CMD_WRITE_SECTORS: 0x30
  CF_CMD_IDENTIFY:      0xEC
  CF_CMD_SET_FEATURES:  0xEF
  CF_CMD_SET_8BIT:      0x01
  CF_DH_LBA:            0xE0

bodges:
  - "Reroute A6 pad on U12 to A18"
  - "Route freed GLUE pin 75 to CPU ~VPA"
  - "Pull up CPU HALT with 4.7K to nearby CPU +5V"
